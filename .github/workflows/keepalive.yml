name: Keep Catura AI Alive

on:
  schedule:
    - cron: '*/8 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Catura AI
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://catura.duckdns.org/ping)
          echo "Response code: $response"
          if [ "$response" -ne 200 ]; then
            echo "Warning: unexpected response code $response"
            exit 1
          fi

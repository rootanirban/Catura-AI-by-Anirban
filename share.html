<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Shared Chat — Catura AI</title>
    <link rel="icon" type="image/png" href="/static/logos.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <!-- style.css gives us colors (--accent, --bg-base, etc.) and the .message/.thinking-block
         classes, but its global body{display:flex} rule is built for the main app shell —
         we override that below with body.share-page so this page lays out normally. -->
    <link rel="stylesheet" href="/static/style.css?v=0.0.341">
    <style>
        /* ── Escape the main app's flex body layout ───────────────────────── */
        body.share-page {
            display: block;
            overflow-y: auto;
            overflow-x: hidden;
            height: auto;
            min-height: 100dvh;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        /* ── Top header ────────────────────────────────────────────────────── */
        .share-header {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 24px;
            background: rgba(13,13,13,0.9);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .share-header .brand {
            display: flex;
            align-items: center;
            gap: 9px;
            font-weight: 700;
            font-size: 15px;
            color: #fff;
            text-decoration: none;
            letter-spacing: -0.2px;
        }
        .share-header .brand img {
            width: 24px;
            height: 24px;
            border-radius: 6px;
        }
        .share-header .cta {
            font-size: 13px;
            font-weight: 600;
            color: #000;
            background: #fff;
            padding: 9px 18px;
            border-radius: 20px;
            text-decoration: none;
            border: none;
            transition: box-shadow 0.2s ease, transform 0.15s ease, background 0.2s ease;
        }
        .share-header .cta:hover {
            box-shadow: 0 0 0 1px rgba(255,255,255,0.4), 0 0 18px 2px rgba(255,255,255,0.55);
            transform: translateY(-1px);
        }

        /* ── Conversation area ────────────────────────────────────────────── */
        #shareChatbox {
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 20px 140px;
            min-height: calc(100dvh - 130px);
        }
        .share-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--text-secondary, #9a9a9a);
            font-size: 14px;
            padding: 80px 20px;
        }
        .share-spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.15);
            border-top-color: #fff;
            border-radius: 50%;
            animation: share-spin 0.7s linear infinite;
        }
        @keyframes share-spin { to { transform: rotate(360deg); } }

        .share-state {
            max-width: 480px;
            margin: 90px auto;
            text-align: center;
            color: #9a9a9a;
            padding: 0 20px;
        }
        .share-state h2 { color: #fff; margin-bottom: 10px; font-size: 20px; }
        .share-state p { line-height: 1.6; }
        .share-state a { color: #fff; text-decoration: underline; text-underline-offset: 2px; }

        /* ── Fixed, non-interactive input bar (visual only, mirrors the live app) ── */
        .share-input-bar {
            position: fixed;
            left: 0; right: 0; bottom: 0;
            z-index: 40;
            display: flex;
            justify-content: center;
            padding: 18px 20px calc(18px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, rgba(13,13,13,1) 55%, rgba(13,13,13,0));
            pointer-events: none;
        }
        .share-input-shell {
            width: 100%;
            max-width: 760px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a1a1a;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 26px;
            padding: 8px 8px 8px 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.35);
        }
        .share-input-placeholder {
            flex: 1;
            font-size: 14.5px;
            color: #6f6f6f;
            user-select: none;
        }
        .share-input-lock-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6f6f6f;
        }
        .share-input-send {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: #fff;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            flex-shrink: 0;
            cursor: not-allowed;
            transition: box-shadow 0.2s ease;
        }
        .share-input-bar:hover .share-input-send,
        .share-input-shell:hover .share-input-send {
            box-shadow: 0 0 0 1px rgba(255,255,255,0.5), 0 0 16px 3px rgba(255,255,255,0.6);
        }
        .share-input-note {
            text-align: center;
            font-size: 11.5px;
            color: #5c5c5c;
            margin-top: 8px;
        }
    </style>
</head>
<body class="share-page">
    <header class="share-header">
        <a href="/" class="brand">
            <img src="/static/logo.png" alt="Catura AI">
            <span>Catura AI</span>
        </a>
        <a href="/" class="cta">Try Catura AI</a>
    </header>

    <main id="shareChatbox">
        <div class="share-loading"><span class="share-spinner"></span> Loading conversation…</div>
    </main>
    <div id="shareState" class="share-state" style="display:none;"></div>

    <div class="share-input-bar">
        <div>
            <div class="share-input-shell">
                <span class="share-input-lock-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </span>
                <span class="share-input-placeholder">This is a shared, read-only conversation</span>
                <button class="share-input-send" disabled aria-disabled="true" title="Read-only">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></svg>
                </button>
            </div>
            <div class="share-input-note">Sign in to Catura AI to continue this conversation or start your own.</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/static/share.js?v=0.0.341"></script>
</body>
</html>
